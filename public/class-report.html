<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Class Reports - St. Ssewasswa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #FFF8E7; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
    h1 { color: #2c5aa0; text-align: center; margin-bottom: 20px; }
    select, button { padding: 10px; margin: 5px; border: 2px solid #2c5aa0; border-radius: 5px; font-size: 16px; }
    button { background: #2c5aa0; color: white; cursor: pointer; }
    button:hover { background: #1e3d6f; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background: #2c5aa0; color: white; }
    .cleared { background: #d4edda; }
    .partial { background: #fff3cd; }
    .unpaid { background: #f8d7da; }
    .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
    .sum-box { background: #2c5aa0; color: white; padding: 15px; border-radius: 5px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Class Fees Report</h1>
    <div style="text-align:center;">
      <select id="classSelect">
        <option value="P.1">P.1</option>
        <option value="P.2">P.2</option>
        <option value="P.3">P.3</option>
        <option value="P.4">P.4</option>
        <option value="P.5">P.5</option>
        <option value="P.6">P.6</option>
        <option value="P.7">P.7</option>
      </select>
      <button onclick="loadReport()">Load Report</button>
      <button onclick="downloadPDF()" style="background:#28a745;">Download PDF</button>
      <button onclick="downloadExcel()" style="background:#17a2b8;">Export Excel</button>
    </div>
    
    <div id="summary" class="summary" style="display:none;"></div>
    <div id="reportTable"></div>
  </div>

  <script>
    let currentClass = 'P.1';
    
    async function loadReport() {
      currentClass = document.getElementById('classSelect').value;
      const res = await fetch(`/api/admin/class-report/${currentClass}`);
      const data = await res.json();
      
      document.getElementById('summary').style.display = 'grid';
      document.getElementById('summary').innerHTML = `
        <div class="sum-box"><h3>${data.students.length}</h3><p>Total Students</p></div>
        <div class="sum-box"><h3>${data.paidCount}</h3><p>Cleared</p></div>
        <div class="sum-box"><h3>${data.unpaidCount}</h3><p>Unpaid</p></div>
        <div class="sum-box"><h3>UGX ${(data.totalCollected/1000).toFixed(0)}K</h3><p>Collected</p></div>
      `;
      
      const termFee = 50000; // Change to your term fee
      document.getElementById('reportTable').innerHTML = `
        <table>
          <thead>
            <tr><th>No.</th><th>Student Name</th><th>Parent Phone</th><th>Paid</th><th>Balance</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${data.students.map((s, i) => {
              const balance = termFee - s.total_paid;
              const status = s.total_paid >= termFee ? 'CLEARED' : s.total_paid > 0 ? 'PARTIAL' : 'UNPAID';
              const cls = status.toLowerCase();
              return `<tr class="${cls}">
                <td>${i+1}</td>
                <td>${s.student_name}</td>
                <td>${s.parent_phone}</td>
                <td>${s.total_paid.toLocaleString()}</td>
                <td>${balance.toLocaleString()}</td>
                <td><strong>${status}</strong></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      `;
    }
    
    function downloadPDF() {
      window.location.href = `/api/admin/class-report-pdf/${currentClass}`;
    }
    
    function downloadExcel() {
      alert('Excel export: Copy table and paste in Excel. PDF is recommended for printing.');
    }
    
    loadReport();
  </script>
</body>
</html>
